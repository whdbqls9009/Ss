<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개미의 꿈 Pro: 멀티 거래소</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-container { display: flex; gap: 20px; max-width: 1000px; width: 100%; }
        
        /* 왼쪽: 차트 및 거래창 */
        .trade-section { flex: 2; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .market-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .market-btn { padding: 10px 20px; border: 1px solid #ddd; background: white; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
        .market-btn.active { background-color: #333; color: white; border-color: #333; }
        .price-area { text-align: center; margin-bottom: 15px; }
        #current-price { font-size: 2.8rem; font-weight: bold; }
        .up { color: #e74c3c; } .down { color: #3498db; }
        .chart-container { position: relative; height: 300px; width: 100%; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; justify-content: center; }
        .controls button { width: 140px; padding: 15px; font-size: 1.1rem; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        .buy { background-color: #e74c3c; } .sell { background-color: #3498db; }
        
        /* 오른쪽: 자산 및 보유 현황 */
        .info-section { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .info-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .info-card h3 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .cash-display { font-size: 1.5rem; font-weight: bold; color: #2ecc71; text-align: center; }
        
        .stock-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .stock-item:last-child { border-bottom: none; }
        .stock-name { font-weight: bold; }
        .stock-details { text-align: right; font-size: 0.9rem; color: #666; }

        @media (max-width: 768px) { .main-container { flex-direction: column; } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="trade-section">
        <div class="market-selector" id="market-selector">
            </div>
        
        <div class="price-area">
            <div id="current-stock-name" style="font-size: 1.1rem; color: #555;">종목 선택</div>
            <div id="current-price" class="up">0원</div>
        </div>

        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>
        
        <div class="controls">
            <button class="buy" onclick="trade('buy')">매수 (1주)</button>
            <button class="sell" onclick="trade('sell')">매도 (1주)</button>
        </div>
    </div>

    <div class="info-section">
        <div class="info-card">
            <h3>💳 체결 가능 현금</h3>
            <div class="cash-display"><span id="total-cash">10,000,000</span> 원</div>
        </div>

        <div class="info-card">
            <h3>🛍️ 보유 주식 평단가</h3>
            <div id="portfolio-list">
                </div>
        </div>
    </div>
</div>

<script>
    // --- 게임 데이터 정의 ---
    let myCash = 10000000; // 초기 자본 1000만 원

    // 종목 데이터 (초기 가격, 변동성 등)
    const stocks = {
        samsung: { name: "삼성전자", price: 75000, history: [], color: "#3498db" },
        hynix: { name: "SK하이닉스", price: 180000, history: [], color: "#e67e22" },
        naver: { name: "NAVER", price: 210000, history: [], color: "#2ecc71" }
    };

    // 내 포트폴리오 (보유량, 평단가)
    let myPortfolio = {
        samsung: { quantity: 0, avgPrice: 0 },
        hynix: { quantity: 0, avgPrice: 0 },
        naver: { quantity: 0, avgPrice: 0 }
    };

    let currentSelectedStock = 'samsung'; // 현재 선택된 종목 키
    let chart; // 차트 인스턴스

    // --- 초기화 ---
    function init() {
        createMarketButtons();
        initChart();
        updateUI();
        selectStock('samsung');
        // 1초마다 모든 종목 가격 갱신
        setInterval(updateAllPrices, 1000);
    }

    // 종목 선택 버튼 생성
    function createMarketButtons() {
        const container = document.getElementById('market-selector');
        for (const key in stocks) {
            const btn = document.createElement('button');
            btn.className = 'market-btn';
            btn.id = `btn-${key}`;
            btn.innerText = stocks[key].name;
            btn.onclick = () => selectStock(key);
            container.appendChild(btn);
        }
    }

    // 종목 선택 시 작동
    function selectStock(stockKey) {
        currentSelectedStock = stockKey;
        
        // 버튼 스타일 변경
        document.querySelectorAll('.market-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${stockKey}`).classList.add('active');

        // 제목 변경
        document.getElementById('current-stock-name').innerText = stocks[stockKey].name;

        // 차트 초기화 및 해당 종목 데이터 주입
        chart.data.datasets[0].label = stocks[stockKey].name;
        chart.data.datasets[0].borderColor = stocks[stockKey].color;
        chart.data.datasets[0].backgroundColor = stocks[stockKey].color + "20"; // 투명도 추가
        updateChartData(); // 데이터 갱신
    }

    // --- 핵심 로직: 가격 변동 ---
    function updateAllPrices() {
        for (const key in stocks) {
            const stock = stocks[key];
            const lastPrice = stock.price;
            
            // 랜덤 가격 변동 (-3% ~ +3.1% 사이 - 살짝 우상향 설정)
            const changeRate = (Math.random() * 0.061 - 0.03).toFixed(4);
            stock.price = Math.floor(stock.price * (1 + parseFloat(changeRate)));

            // 동전주 방지 (최소 가격 1000원)
            if (stock.price < 1000) stock.price = 1000;

            // 히스토리 저장 (최근 50개만)
            stock.history.push(stock.price);
            if (stock.history.length > 50) stock.history.shift();
        }

        // 현재 보고 있는 종목이라면 화면과 차트 갱신
        updatePriceDisplay();
        updateChartData();
    }

    // 현재 가격 화면 표시 갱신
    function updatePriceDisplay() {
        const stock = stocks[currentSelectedStock];
        const priceEl = document.getElementById('current-price');
        const lastPrice = stock.history.length > 1 ? stock.history[stock.history.length - 2] : stock.price;

        priceEl.innerText = stock.price.toLocaleString() + " 원";

        if (stock.price > lastPrice) {
            priceEl.className = "up"; // 상승 시 빨강
        } else if (stock.price < lastPrice) {
            priceEl.className = "down"; // 하락 시 파랑
        }
    }

    // --- 매매 로직 ---
    function trade(type) {
        const stockKey = currentSelectedStock;
        const currentPrice = stocks[stockKey].price;
        const holding = myPortfolio[stockKey];

        if (type === 'buy') {
            if (myCash >= currentPrice) {
                myCash -= currentPrice;
                // 평단가 계산: (기존총액 + 신규총액) / 전체수량
                const totalCost = (holding.quantity * holding.avgPrice) + currentPrice;
                holding.quantity++;
                holding.avgPrice = Math.floor(totalCost / holding.quantity);
            } else {
                alert("잔액이 부족합니다!");
            }
        } else if (type === 'sell') {
            if (holding.quantity > 0) {
                myCash += currentPrice;
                holding.quantity--;
                if (holding.quantity === 0) holding.avgPrice = 0; // 모두 팔면 평단가 초기화
            } else {
                alert("보유 주식이 없습니다!");
            }
        }

        updateUI();
    }

    // --- UI 및 차트 업데이트 ---
    function updateUI() {
        // 현금 갱신
        document.getElementById('total-cash').innerText = myCash.toLocaleString();

        // 포트폴리오 리스트 갱신
        const listContainer = document.getElementById('portfolio-list');
        listContainer.innerHTML = ''; // 초기화

        for (const key in myPortfolio) {
            if (myPortfolio[key].quantity > 0) {
                const stockItem = document.createElement('div');
                stockItem.className = 'stock-item';
                stockItem.innerHTML = `
                    <div class="stock-name">${stocks[key].name}</div>
                    <div class="stock-details">
                        <b>${myPortfolio[key].quantity.toLocaleString()} 주</b><br>
                        평단 ${myPortfolio[key].avgPrice.toLocaleString()}원
                    </div>
                `;
                listContainer.appendChild(stockItem);
            }
        }
    }

    // 차트 초기 설정
    function initChart() {
        const ctx = document.getElementById('priceChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 50}, (_, i) => i + 1), // x축 1~50
                datasets: [{
                    label: '',
                    data: [],
                    borderWidth: 2,
                    pointRadius: 0, // 점 숨기기
                    fill: true, // 아래 영역 채우기
                    tension: 0.1 // 곡선 부드러움
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { display: false }, // x축 라벨 숨기기
                    y: { 
                        beginAtZero: false,
                        grid: { color: '#f0f0f0' }
                    }
                },
                plugins: {
                    legend: { display: false } // 범례 숨기기
                },
                animation: { duration: 200 } // 애니메이션 속도
            }
        });
    }

    // 차트 데이터 갱신
    function updateChartData() {
        if (!chart) return;
        const history = stocks[currentSelectedStock].history;
        chart.data.datasets[0].data = history;
        // x축 라벨 개수 맞추기
        chart.data.labels = Array.from({length: history.length}, (_, i) => i + 1);
        chart.update('none'); // 성능을 위해 애니메이션 없이 업데이트
    }

    // 시작
    window.onload = init;

</script>
</body>
</html>
